[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/sw.js"
  to = "/sw.js"
  status = 200

[[redirects]]
  from = "/manifest.webmanifest"
  to = "/manifest.webmanifest"
  status = 200

[[redirects]]
  from = "/icon-192.png"
  to = "/icon-192.png"
  status = 200

[[redirects]]
  from = "/icon-512.png"
  to = "/icon-512.png"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
